name: GLM Coding 库存监控

on:
  # 每天上午 9:50-10:30 高峰期每 2 分钟检查一次
  schedule:
    # 9:50-10:30 每 2 分钟
    - cron: '*/2 1-2 * * *'  # UTC 时间 9:50-10:30 = 北京时间 9:50-10:30（需调整）
    # 其他时间每 10 分钟检查一次
    - cron: '*/10 2-23 * * *'
    - cron: '*/10 0-1 * * *'
  # 支持手动触发
  workflow_dispatch:

# 防止并发运行
concurrency:
  group: stock-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 执行库存检查
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_ACTIONS: "true"
        run: python monitor.py
        continue-on-error: true

      - name: 上传调试截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot
          path: screenshot.png
          retention-days: 3

  # 单独的高峰期密集监控任务
  peak-monitor:
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/2 1-2 * * *' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 3

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 安装依赖
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: 执行库存检查
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          GITHUB_ACTIONS: "true"
        run: python monitor.py

      - name: 上传调试截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshot-peak
          path: screenshot.png
          retention-days: 1
